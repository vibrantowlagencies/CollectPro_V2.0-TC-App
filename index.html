<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#ea580c"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>CollectPro · TC</title>

<!-- React + Babel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* ── FONTS ── */
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

/* ── DESIGN TOKENS ── */
:root {
  --orange:    #ea580c;
  --orange-dk: #c2410c;
  --orange-lt: #fff7ed;
  --orange-md: #fed7aa;
  --green:     #16a34a;
  --green-lt:  #f0fdf4;
  --red:       #dc2626;
  --red-lt:    #fef2f2;
  --amber:     #d97706;
  --amber-lt:  #fffbeb;
  --blue:      #2563eb;
  --blue-lt:   #eff6ff;
  --purple:    #7c3aed;
  --purple-lt: #f5f3ff;
  --gray-50:   #f9fafb;
  --gray-100:  #f3f4f6;
  --gray-200:  #e5e7eb;
  --gray-400:  #9ca3af;
  --gray-500:  #6b7280;
  --gray-700:  #374151;
  --gray-900:  #111827;
  --bg:        #ffffff;
  --bg2:       #f9fafb;
  --border:    #e5e7eb;
  --text:      #111827;
  --text2:     #374151;
  --text3:     #6b7280;
  --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,.1);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.12);
  --r:         14px;
  --r-sm:      10px;
  --fh:        'DM Sans', sans-serif;
  --fb:        'DM Sans', sans-serif;
  --fm:        'DM Mono', monospace;
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); overscroll-behavior: none; }
body { font-family: var(--fb); color: var(--text); -webkit-font-smoothing: antialiased; }
#root { height: 100%; display: flex; flex-direction: column; }

/* ── APP SHELL ── */
.app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; background: var(--bg); position: relative; overflow: hidden; }

/* ── HEADER ── */
.header { 
  background: var(--orange); 
  padding: 14px 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  position: relative;
}
.header::after {
  content: '';
  position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: rgba(255,255,255,.15);
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo { 
  width: 34px; height: 34px; background: rgba(255,255,255,.2); 
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  font-family: var(--fh); font-weight: 800; font-size: 13px; color: #fff; letter-spacing: -.5px;
}
.brand-name { font-family: var(--fh); font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
.brand-role { font-size: 10px; font-weight: 600; color: rgba(255,255,255,.7); letter-spacing: .5px; text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 8px; }
.chip { 
  background: rgba(255,255,255,.2); color: #fff; 
  font-family: var(--fm); font-size: 11px; font-weight: 500;
  padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,.3);
}
.logout-btn {
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,.8); font-size: 18px; padding: 4px;
  transition: color .15s;
}
.logout-btn:hover { color: #fff; }

/* ── PAGE CONTAINER ── */
.page { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }
.wrap { padding: 0 14px; }

/* ── NAV BAR ── */
.nav { 
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--bg); border-top: 1px solid var(--border);
  display: flex; align-items: stretch;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 50;
}
.nav-item { 
  flex: 1; display: flex; flex-direction: column; align-items: center; 
  justify-content: center; gap: 3px; padding: 10px 6px;
  cursor: pointer; border: none; background: none;
  font-family: var(--fh); transition: all .15s;
}
.nav-item .nav-icon { font-size: 20px; transition: transform .15s; }
.nav-item .nav-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: .3px; }
.nav-item.active .nav-icon { transform: scale(1.1); }
.nav-item.active .nav-label { color: var(--orange); }
.nav-item .nav-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--orange); margin-top: 2px; }

/* ── LOGIN SCREEN ── */
.login-screen {
  height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: linear-gradient(160deg, #fff7ed 0%, #fff 50%, #fff7ed 100%);
  padding: 32px 24px;
}
.login-logo {
  width: 72px; height: 72px; background: var(--orange);
  border-radius: 20px; display: flex; align-items: center; justify-content: center;
  font-family: var(--fh); font-weight: 800; font-size: 22px; color: #fff;
  margin-bottom: 24px;
  box-shadow: 0 8px 24px rgba(234,88,12,.35);
}
.login-title { font-family: var(--fh); font-size: 24px; font-weight: 700; color: var(--gray-900); margin-bottom: 4px; }
.login-sub { font-size: 14px; color: var(--text3); margin-bottom: 32px; text-align: center; }
.login-card { background: var(--bg); border-radius: var(--r); border: 1px solid var(--border); padding: 24px; width: 100%; max-width: 360px; box-shadow: var(--shadow-md); }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; letter-spacing: .3px; text-transform: uppercase; }
.field select, .field input {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
  border-radius: var(--r-sm); font-family: var(--fb); font-size: 15px; color: var(--text);
  background: var(--bg); outline: none; transition: border-color .2s;
  -webkit-appearance: none; appearance: none;
}
.field select:focus, .field input:focus { border-color: var(--orange); }
.pin-wrap { display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; }
.pin-dot { 
  width: 48px; height: 48px; border-radius: 12px;
  border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 22px; transition: all .2s; background: var(--bg);
}
.pin-dot.filled { border-color: var(--orange); background: var(--orange-lt); }
.pin-dot.filled::after { content: '●'; color: var(--orange); font-size: 14px; }
.numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.num-btn {
  aspect-ratio: 1; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--bg); font-family: var(--fh); font-size: 20px; font-weight: 600;
  color: var(--text); cursor: pointer; transition: all .12s;
  display: flex; align-items: center; justify-content: center;
}
.num-btn:active { background: var(--orange-lt); border-color: var(--orange); transform: scale(.95); }
.num-btn.del { font-size: 18px; color: var(--text3); }
.btn { 
  width: 100%; padding: 14px; border-radius: var(--r-sm); border: none;
  font-family: var(--fh); font-size: 15px; font-weight: 700; cursor: pointer;
  transition: all .15s; letter-spacing: .2px;
}
.btn-primary { background: var(--orange); color: #fff; }
.btn-primary:active { background: var(--orange-dk); transform: scale(.98); }
.btn-primary:disabled { background: var(--gray-200); color: var(--text3); cursor: not-allowed; transform: none; }

/* ── TOAST ── */
.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-10px);
  background: var(--gray-900); color: #fff; font-family: var(--fh); font-size: 13px; font-weight: 500;
  padding: 10px 18px; border-radius: 20px; z-index: 999; white-space: nowrap;
  opacity: 0; transition: all .25s; pointer-events: none;
  box-shadow: var(--shadow-lg);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--green); }
.toast.error   { background: var(--red); }

/* ── HOME / DASHBOARD ── */
.dash-header { 
  background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dk) 100%);
  padding: 20px 16px 24px; margin-bottom: -8px;
}
.dash-greeting { font-size: 13px; color: rgba(255,255,255,.75); font-weight: 500; margin-bottom: 2px; }
.dash-name { font-family: var(--fh); font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 16px; }
.dash-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.stat-pill {
  background: rgba(255,255,255,.15); border-radius: 12px; padding: 12px 8px;
  text-align: center; border: 1px solid rgba(255,255,255,.2);
}
.stat-pill-val { font-family: var(--fm); font-size: 22px; font-weight: 500; color: #fff; line-height: 1; }
.stat-pill-lbl { font-size: 10px; color: rgba(255,255,255,.7); font-weight: 600; letter-spacing: .4px; text-transform: uppercase; margin-top: 4px; }
.dash-cards { padding: 20px 14px 0; display: flex; flex-direction: column; gap: 10px; }
.dash-card {
  background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--r);
  padding: 16px; display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: all .15s; box-shadow: var(--shadow);
}
.dash-card:active { background: var(--orange-lt); border-color: var(--orange); transform: scale(.99); }
.dash-card-icon { font-size: 28px; flex-shrink: 0; }
.dash-card-info { flex: 1; }
.dash-card-title { font-family: var(--fh); font-size: 15px; font-weight: 700; color: var(--text); }
.dash-card-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.dash-card-count { font-family: var(--fm); font-size: 22px; font-weight: 500; color: var(--orange); }

/* ── ACCOUNTS LIST ── */
.list-header { 
  padding: 14px 14px 10px; 
  position: sticky; top: 0; background: var(--bg); z-index: 10;
  border-bottom: 1px solid var(--border);
}
.list-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.list-title { font-family: var(--fh); font-size: 16px; font-weight: 700; }
.refresh-btn { 
  background: var(--orange-lt); border: 1px solid var(--orange-md); color: var(--orange);
  border-radius: 8px; padding: 5px 10px; font-family: var(--fh); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.refresh-btn:active { background: var(--orange-md); }
.filter-chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.filter-chips::-webkit-scrollbar { display: none; }
.chip-btn {
  flex-shrink: 0; padding: 6px 12px; border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--bg); font-family: var(--fh); font-size: 12px; font-weight: 600;
  color: var(--text3); cursor: pointer; transition: all .15s; white-space: nowrap;
}
.chip-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }
.chip-btn:active { transform: scale(.95); }

/* ── ACCOUNT CARD ── */
.account-card {
  margin: 0 14px 10px; padding: 14px; border-radius: var(--r);
  border: 1.5px solid var(--border); background: var(--bg);
  cursor: pointer; transition: all .15s; box-shadow: var(--shadow);
  animation: cardIn .2s ease;
}
.account-card:active { transform: scale(.99); box-shadow: none; }
@keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.account-card.priority-1 { border-left: 4px solid var(--orange); }
.account-card.priority-2 { border-left: 4px solid var(--amber); }
.account-card.priority-3 { border-left: 4px solid var(--blue); }
.account-card.priority-fresh { border-left: 4px solid var(--green); }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.card-name { font-family: var(--fh); font-size: 15px; font-weight: 700; color: var(--text); }
.card-accno { font-family: var(--fm); font-size: 11px; color: var(--text3); margin-top: 1px; }
.status-badge {
  font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px;
  letter-spacing: .3px; text-transform: uppercase; flex-shrink: 0; margin-left: 8px;
}
.s-fresh        { background: var(--green-lt);  color: var(--green);  border: 1px solid #86efac; }
.s-called       { background: var(--blue-lt);   color: var(--blue);   border: 1px solid #bfdbfe; }
.s-appt         { background: var(--orange-lt); color: var(--orange); border: 1px solid var(--orange-md); }
.s-rescheduled  { background: var(--amber-lt);  color: var(--amber);  border: 1px solid #fde68a; }
.s-nr           { background: var(--red-lt);    color: var(--red);    border: 1px solid #fecaca; }
.s-issue        { background: var(--purple-lt); color: var(--purple); border: 1px solid #ddd6fe; }
.s-strike       { background: #fef2f2;          color: #991b1b;       border: 1px solid #fecaca; }
.card-info { display: flex; flex-direction: column; gap: 4px; }
.card-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); }
.card-row-icon { font-size: 13px; flex-shrink: 0; }
.card-appt { 
  background: var(--orange-lt); border: 1px solid var(--orange-md); border-radius: 8px;
  padding: 6px 10px; display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; color: var(--orange); margin-top: 8px;
}
.card-actions { display: flex; gap: 8px; margin-top: 10px; }
.card-btn {
  flex: 1; padding: 9px; border-radius: 9px; border: none; cursor: pointer;
  font-family: var(--fh); font-size: 13px; font-weight: 700; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.card-btn:active { transform: scale(.97); }
.btn-call  { background: var(--green);  color: #fff; }
.btn-wa    { background: #25d366;       color: #fff; }
.btn-log   { background: var(--orange-lt); color: var(--orange); border: 1.5px solid var(--orange-md); }
.strikes { display: flex; gap: 3px; margin-top: 6px; }
.strike-dot { width: 8px; height: 8px; border-radius: 50%; }
.strike-dot.active { background: var(--red); }
.strike-dot.inactive { background: var(--gray-200); }

/* ── LOG CALL BOTTOM SHEET ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100;
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.sheet {
  background: var(--bg); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto; padding: 16px 16px 32px;
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.sheet-title { font-family: var(--fh); font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.sheet-sub { font-size: 13px; color: var(--text3); margin-bottom: 16px; }
.sheet-customer {
  background: var(--orange-lt); border: 1px solid var(--orange-md); border-radius: var(--r-sm);
  padding: 12px 14px; margin-bottom: 16px;
}
.sheet-customer-name { font-family: var(--fh); font-size: 15px; font-weight: 700; }
.sheet-customer-acc { font-family: var(--fm); font-size: 12px; color: var(--orange); }
.section-label { font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 8px; }
.outcome-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.outcome-btn {
  padding: 11px 8px; border-radius: var(--r-sm); border: 1.5px solid var(--border);
  background: var(--bg); font-family: var(--fh); font-size: 12px; font-weight: 600;
  color: var(--text); cursor: pointer; transition: all .15s; text-align: center;
}
.outcome-btn:active { transform: scale(.97); }
.outcome-btn.selected { border-color: var(--orange); background: var(--orange); color: #fff; }
.outcome-btn.selected-green { border-color: var(--green); background: var(--green); color: #fff; }
.outcome-btn.selected-red { border-color: var(--red); background: var(--red); color: #fff; }
.outcome-btn.selected-amber { border-color: var(--amber); background: var(--amber); color: #fff; }
.outcome-btn.selected-purple { border-color: var(--purple); background: var(--purple); color: #fff; }
.remark-input {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
  border-radius: var(--r-sm); font-family: var(--fb); font-size: 14px; color: var(--text);
  resize: none; outline: none; transition: border-color .2s; min-height: 80px;
}
.remark-input:focus { border-color: var(--orange); }
.date-input {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
  border-radius: var(--r-sm); font-family: var(--fb); font-size: 15px; color: var(--text);
  outline: none; transition: border-color .2s; margin-bottom: 16px;
  -webkit-appearance: none;
}
.date-input:focus { border-color: var(--orange); }
.submit-btn {
  width: 100%; padding: 15px; border-radius: var(--r-sm); border: none;
  background: var(--orange); color: #fff; font-family: var(--fh); font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all .15s; margin-top: 8px;
}
.submit-btn:disabled { background: var(--gray-200); color: var(--text3); cursor: not-allowed; }
.submit-btn:not(:disabled):active { background: var(--orange-dk); transform: scale(.99); }
.cancel-link {
  display: block; text-align: center; margin-top: 12px; font-size: 14px;
  color: var(--text3); cursor: pointer; font-weight: 500;
}

/* ── DAILY REPORT ── */
.report-header { 
  background: linear-gradient(135deg, #1e293b 0%, #374151 100%);
  padding: 20px 16px; margin-bottom: 14px;
}
.report-date { font-size: 12px; color: rgba(255,255,255,.6); margin-bottom: 4px; }
.report-title { font-family: var(--fh); font-size: 20px; font-weight: 700; color: #fff; }
.report-stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 14px; }
.report-stat { background: rgba(255,255,255,.1); border-radius: 10px; padding: 10px; text-align: center; }
.report-stat-val { font-family: var(--fm); font-size: 20px; color: #fff; font-weight: 500; }
.report-stat-lbl { font-size: 10px; color: rgba(255,255,255,.6); font-weight: 600; letter-spacing: .3px; margin-top: 2px; }
.report-section { padding: 0 14px 14px; }
.report-row {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm);
  padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
}
.report-row-time { font-family: var(--fm); font-size: 11px; color: var(--text3); flex-shrink: 0; }
.report-row-info { flex: 1; }
.report-row-name { font-size: 14px; font-weight: 600; }
.report-row-outcome { font-size: 12px; color: var(--text3); margin-top: 1px; }

/* ── EMPTY STATE ── */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; text-align: center; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-family: var(--fh); font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.empty-sub { font-size: 14px; color: var(--text3); line-height: 1.5; }

/* ── SKELETON ── */
.skeleton { background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
@keyframes shimmer { to { background-position: -200% 0; } }
.skel-card { height: 100px; margin: 0 14px 10px; border-radius: var(--r); }

/* ── OUTCOME GROUPS ── */
.outcome-group { margin-bottom: 14px; }
.outcome-group-title { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 6px; padding: 0 2px; }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 12px 0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ─────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────
const CONFIG = {
  API_URL:   'https://script.google.com/macros/s/AKfycbyRb7oEMdppJKouU5xCAQVq-IauFaugqXslscYChoFaXkvWzIQzHCg9q5u3AZWAlxB_Pg/exec',
  CLIENT_ID: 'VOA_CBE',
  TOKEN_TTL: 29 * 60 * 1000, // 29 min — refresh before 30 min expiry
};

// ─────────────────────────────────────────────
//  OUTCOME DEFINITIONS
// ─────────────────────────────────────────────
const OUTCOME_GROUPS = [
  {
    title: 'Connected',

// ─────────────────────────────────────────────
//  API
// ─────────────────────────────────────────────
const Api = {
  async get(params) {
    const url = new URL(CONFIG.API_URL);
    url.searchParams.set('client_id', CONFIG.CLIENT_ID);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    const r = await fetch(url.toString());
    if (!r.ok) throw new Error('Network error');
    const j = await r.json();
    if (!j.success) throw new Error(j.error || 'API error');
    return j.data;
  },
  async post(body) {
    const r = await fetch(CONFIG.API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ client_id: CONFIG.CLIENT_ID, ...body })
    });
    if (!r.ok) throw new Error('Network error');
    const j = await r.json();
    if (!j.success) throw new Error(j.error || 'API error');
    return j.data;
  }
};

const getStatusBadgeClass = (status) => {
  if (status === 'FRESH')           return 's-fresh';
  if (status === 'CALLED')          return 's-called';
  if (status === 'APPT_FIXED')      return 's-appt';
  if (status === 'RESCHEDULED')     return 's-rescheduled';
  if (status === 'NOT_REACHABLE')   return 's-nr';
  if (status === 'NOT_VISITED')     return 's-nr';
  if (status.startsWith('ISSUE_'))  return 's-issue';
  if (status.startsWith('STRIKE_')) return 's-strike';
  if (status.startsWith('NR_'))     return 's-nr';
  return 's-fresh';
};

const getStatusLabel = (status) => {
  const map = {
    FRESH: 'Fresh', CALLED: 'Called', APPT_FIXED: 'Appt Fixed',
    RESCHEDULED: 'Rescheduled', NOT_REACHABLE: 'Not Reachable',
    NOT_VISITED: 'Not Visited', STRIKE_1: 'Strike 1', STRIKE_2: 'Strike 2',
    STRIKE_3: 'Strike 3', ISSUE_REFUND: 'Refund', ISSUE_RECONNECTION: 'Reconnection',
    ISSUE_MAIL: 'Mail', ISSUE_JBOX: 'Junction Box', ISSUE_ADDR: 'Addr Change',
    NR_WRONG_NO: 'Wrong No', NR_OWN: 'Not Willing', NR_ADDR: 'Addr Not Found',
    COLLECTED: 'Collected',
  };
  return map[status] || status;
};

const getCardPriorityClass = (p) => {
  if (p <= 1) return 'priority-1';
  if (p <= 2) return 'priority-2';
  if (p <= 3) return 'priority-3';
  return 'priority-fresh';
};

const Toast = ({ msg, type }) => (
  <div className={`toast ${msg ? 'show' : ''} ${type || ''}`}>{msg}</div>
);

function useToast() {
  const [toast, setToast] = useState({ msg: '', type: '' });
  const show = useCallback((msg, type = '') => {
    setToast({ msg, type });
    setTimeout(() => setToast({ msg: '', type: '' }), 2800);
  }, []);
  return [toast, show];
}

const LoginScreen = ({ onLogin }) => {
  const [city,    setCity]    = useState('CBE');
  const [staffId, setStaffId] = useState('');
  const [pin,     setPin]     = useState('');
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState('');

  const handleNum = (n) => { if (pin.length < 4) setPin(p => p + n); };
  const handleDel = ()  => setPin(p => p.slice(0, -1));

  useEffect(() => {
    if (pin.length === 4 && staffId.trim()) handleLogin();
  }, [pin]);

  const handleLogin = async () => {
    if (!staffId.trim() || pin.length < 4) return;
    setLoading(true); setError('');
    try {
      const data = await Api.get({ action: 'login', staffId: staffId.trim().toUpperCase(), pin, city });
      if (data.role !== 'TELECALLER') {
        setError('This app is for Telecallers only.');
        setPin(''); setLoading(false); return;
      }
      SS.set(data);
      onLogin(data);
    } catch (e) {
      setError(e.message || 'Invalid credentials');
      setPin('');
    } finally { setLoading(false); }
  };

  const NUMS = ['1','2','3','4','5','6','7','8','9','','0','⌫'];

  return (
    <div className="login-screen">
      <div className="login-logo">VOA</div>
      <div className="login-title">CollectPro</div>
      <div className="login-sub">Telecaller App · Sign in to continue</div>

      <div className="login-card">
        <div className="field">
          <label>City</label>
          <select value={city} onChange={e => setCity(e.target.value)}>
            <option value="CBE">Coimbatore (CBE)</option>
            <option value="CHN">Chennai (CHN)</option>
          </select>
        </div>
        <div className="field">
          <label>Staff ID</label>
          <input value={staffId} onChange={e => setStaffId(e.target.value)}
            placeholder="TC_001" autoCapitalize="characters"
            onKeyDown={e => e.key === 'Enter' && pin.length === 4 && handleLogin()}
          />
        </div>

        <label style={{fontSize:12,fontWeight:700,color:'var(--text2)',display:'block',marginBottom:8,letterSpacing:'.3px',textTransform:'uppercase'}}>PIN</label>
        <div className="pin-wrap">
          {[0,1,2,3].map(i => <div key={i} className={`pin-dot ${i < pin.length ? 'filled' : ''}`}/>)}
        </div>

        <div className="numpad">
          {NUMS.map((n, i) => (
            <button key={i} className={`num-btn ${n === '⌫' ? 'del' : ''}`}
              onClick={() => n === '⌫' ? handleDel() : n !== '' ? handleNum(n) : null}
              disabled={loading}
            >{n}</button>
          ))}
        </div>

        {error && <div style={{background:'var(--red-lt)',border:'1px solid #fecaca',borderRadius:8,padding:'10px 12px',fontSize:13,color:'var(--red)',marginBottom:12,fontWeight:500}}>{error}</div>}

        <button className="btn btn-primary" onClick={handleLogin}
          disabled={loading || !staffId.trim() || pin.length < 4}>
          {loading ? 'Signing in…' : 'Sign In →'}
        </button>
      </div>
    </div>
  );
};

const LogCallSheet = ({ account, session, onClose, onSuccess, showToast }) => {
  const [outcome,  setOutcome]  = useState('');
  const [remark,   setRemark]   = useState('');
  const [apptDate, setApptDate] = useState(tomorrowStr());
  const [loading,  setLoading]  = useState(false);

  const selectedOutcome = ALL_OUTCOMES.find(o => o.value === outcome);
  const needsDate = selectedOutcome?.needsDate;

  const handleSubmit = async () => {
    if (!outcome) { showToast('Select an outcome', 'error'); return; }
    if (needsDate && !apptDate) { showToast('Select appointment date', 'error'); return; }
    setLoading(true);
    try {
      await Api.post({
        action: 'log_call', token: session.token,
        city: session.city, staffId: session.staffId,
        accountNo: account.accountNo, outcome,
        tcRemark: remark, apptDate: needsDate ? apptDate : ''
      });
      onSuccess(`${account.name} → ${outcome}`);
      onClose();
    } catch (e) {
      showToast(e.message, 'error');
    } finally { setLoading(false); }
  };

  const getOutcomeClass = (group, val) => {
    if (outcome !== val) return '';
    const map = { Connected:'selected-green', Rescheduled:'selected-amber', 'Not Reachable':'selected-red', 'Issues / Special':'selected-purple', 'Non Recoverable':'selected-red' };
    return map[group] || 'selected';
  };

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div className="sheet-title">Log Call Outcome</div>
        <div className="sheet-sub">Record the result of your call</div>

        <div className="sheet-customer">
          <div className="sheet-customer-name">{account.name}</div>
          <div className="sheet-customer-acc">📞 {account.mobile} · {account.accountNo}</div>
        </div>

        {OUTCOME_GROUPS.map(group => (
          <div key={group.title} className="outcome-group">
            <div className="outcome-group-title">{group.title}</div>
            <div className="outcome-grid">
              {group.items.map(item => (
                <button key={item.value}
                  className={`outcome-btn ${outcome === item.value ? getOutcomeClass(group.title, item.value) : ''}`}
                  onClick={() => setOutcome(item.value)}>
                  {item.label}
                </button>
              ))}
            </div>
          </div>
        ))}

        {needsDate && (
          <>
            <div className="section-label" style={{marginBottom:8}}>Appointment Date</div>
            <input type="date" className="date-input" value={apptDate}
              min={todayStr()} onChange={e => setApptDate(e.target.value)}/>
          </>
        )}

        <div className="section-label" style={{marginBottom:8}}>Remark (optional)</div>
        <textarea className="remark-input" value={remark} onChange={e => setRemark(e.target.value)}
          placeholder="Add any notes about this call…" rows={3}/>

        <button className="submit-btn" onClick={handleSubmit}
          disabled={!outcome || loading}>
          {loading ? 'Saving…' : '✅ Submit Outcome'}
        </button>
        <div className="cancel-link" onClick={onClose}>Cancel</div>
      </div>
    </div>
  );
};

const NAV = [
  { id: 'home',     icon: '🏠', label: 'Home'     },
  { id: 'accounts', icon: '📋', label: 'Accounts'  },
  { id: 'report',   icon: '📊', label: 'Report'    },
];

const AppShell = ({ session, onLogout }) => {
  const [tab,       setTab]       = useState('home');
  const [dashboard, setDashboard] = useState(null);
  const [toast,     showToast]    = useToast();

  const loadDashboard = useCallback(async () => {
    try {
      const d = await Api.get({
        action: 'get_tc_dashboard', token: session.token,
        staffId: session.staffId, city: session.city
      });
      setDashboard(d);
    } catch (e) {}
  }, [session]);

  useEffect(() => { loadDashboard(); }, [loadDashboard]);

  const pages = {
    home:     <HomeTab session={session} dashboard={dashboard} onTabChange={setTab}/>,
    accounts: <AccountsTab session={session} showToast={showToast} onDashboardRefresh={loadDashboard}/>,
    report:   <ReportTab   session={session} showToast={showToast}/>,
  };

  return (
    <div className="app">
      <div className="header">
        <div className="brand">
          <div className="brand-logo">VOA</div>
          <div>
            <div className="brand-name">CollectPro</div>
            <div className="brand-role">Telecaller Portal</div>
          </div>
        </div>
        <div className="header-right">
          <span className="chip">{session.city}</span>
          <span className="chip" style={{background:'rgba(255,255,255,.3)'}}>{session.staffName?.split(' ')[0]}</span>
          <button className="logout-btn" onClick={onLogout} title="Logout">✕</button>
        </div>
      </div>

      <div className="page">
        {pages[tab]}
      </div>

      <div className="nav">
        {NAV.map(n => (
          <button key={n.id} className={`nav-item ${tab === n.id ? 'active' : ''}`} onClick={() => setTab(n.id)}>
            <span className="nav-icon">{n.icon}</span>
            <span className="nav-label">{n.label}</span>
            {tab === n.id && <div className="nav-dot"/>}
          </button>
        ))}
      </div>

      <Toast msg={toast.msg} type={toast.type}/>
    </div>
  );
};

// ─────────────────────────────────────────────
//  ROOT
// ─────────────────────────────────────────────
const App = () => {
  const [session, setSession] = useState(SS.get);

  const handleLogin  = (s) => setSession(s);
  const handleLogout = ()  => { SS.clear(); setSession(null); };

  if (!session) return <LoginScreen onLogin={handleLogin}/>;
  return <AppShell session={session} onLogout={handleLogout}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

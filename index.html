<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* ── DESIGN TOKENS ─────────────────────────────────── */
:root{
  --bg:#f8f9fb; --bg2:#ffffff; --bg3:#f1f4f8;
  --accent:#f97316; --accent-lt:#fff4ed; --accent-dk:#ea6c0a;
  --blue:#3b82f6; --blue-lt:#eff6ff;
  --green:#16a34a; --green-lt:#f0fdf4;
  --red:#dc2626; --red-lt:#fef2f2;
  --amber:#d97706; --amber-lt:#fffbeb;
  --purple:#7c3aed; --purple-lt:#f5f3ff;
  --cyan:#0891b2; --cyan-lt:#ecfeff;
  --border:#e4e8ef; --border2:#d0d7e3;
  --text:#0f172a; --text2:#475569; --text3:#94a3b8;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --r:14px;
  --fh:'Sora',sans-serif;
  --fm:'JetBrains Mono',monospace;
  --fb:'Plus Jakarta Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased}

/* ── ANIMATIONS ─────────────────────────────────────── */
@keyframes fadeUp  {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn  {from{opacity:0}to{opacity:1}}
@keyframes shake   {0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes spin    {to{transform:rotate(360deg)}}
@keyframes dotPop  {0%{transform:scale(.8);opacity:.4}50%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes slideIn {from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse   {0%,100%{opacity:1}50%{opacity:.5}}
@keyframes hotPulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.3)}50%{box-shadow:0 0 0 6px rgba(220,38,38,0)}}

/* ── LOGIN ──────────────────────────────────────────── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#fff4ed,#f8f9fb,#fff);padding:24px}
.login-card{background:#fff;border:1px solid var(--border);border-radius:24px;padding:44px 36px;width:100%;max-width:390px;box-shadow:var(--shadow-lg);animation:fadeUp .4s ease}
.login-card.shake{animation:shake .4s ease}
.login-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:36px}
.login-logo{width:72px;height:72px;background:linear-gradient(135deg,var(--accent),var(--accent-dk));border-radius:20px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:22px;color:#fff;box-shadow:0 8px 28px rgba(249,115,22,.28);letter-spacing:.5px}
.login-title{font-family:var(--fh);font-size:24px;font-weight:700;color:var(--text)}
.login-sub  {font-size:13px;color:var(--text3);text-align:center;line-height:1.5}
.form-group {margin-bottom:18px}
.form-label {font-size:11px;font-family:var(--fm);letter-spacing:1px;color:var(--text3);margin-bottom:8px;display:block;text-transform:uppercase}
.form-input {width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:13px 15px;color:var(--text);font-family:var(--fb);font-size:15px;outline:none;transition:all .2s;-webkit-appearance:none}
.form-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(249,115,22,.1)}
.form-input.pin-field{font-family:var(--fm);font-size:22px;text-align:center;letter-spacing:.3em}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:4px 0 20px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all .15s ease}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);animation:dotPop .2s ease}
.btn-login{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent-dk));border:none;border-radius:14px;color:#fff;font-family:var(--fh);font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(249,115,22,.3);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.55;cursor:not-allowed;box-shadow:none}
.login-error{background:var(--red-lt);border:1px solid rgba(220,38,38,.2);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--red);margin-top:12px;animation:fadeIn .2s ease;text-align:center}

/* ── APP SHELL ──────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent-dk));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:11px;color:#fff;letter-spacing:.5px}
.brand-name{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--text)}
.brand-role{font-family:var(--fm);font-size:10px;color:var(--accent);background:var(--accent-lt);padding:3px 9px;border-radius:20px;border:1px solid rgba(249,115,22,.2);letter-spacing:.5px}
.hdr-right{display:flex;align-items:center;gap:8px}
.staff-badge{font-family:var(--fm);font-size:11px;color:var(--text2);background:var(--bg3);padding:5px 10px;border-radius:8px;border:1px solid var(--border)}
.city-badge{font-family:var(--fm);font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-lt);padding:4px 9px;border-radius:20px;border:1px solid rgba(249,115,22,.2);letter-spacing:.5px}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text3);cursor:pointer;padding:5px 10px;font-size:12px;font-family:var(--fb);transition:all .15s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* ── BOTTOM NAV ─────────────────────────────────────── */
.bnav{display:flex;background:var(--bg2);border-top:1px solid var(--border);height:60px;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:var(--fb);font-weight:600;transition:color .2s;padding:0;position:relative}
.ni .ico{font-size:20px}
.ni.on{color:var(--accent)}
.nav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;font-weight:800;font-family:var(--fm);min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg2)}

/* ── PAGES ──────────────────────────────────────────── */
.main-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
.page{display:none;padding-bottom:80px}
.page.on{display:block;animation:fadeIn .2s ease}

/* ── DASHBOARD ──────────────────────────────────────── */
.dash-wrap{padding:16px}
.dash-greeting{font-family:var(--fh);font-size:20px;font-weight:700;margin-bottom:2px}
.dash-date{font-size:12px;color:var(--text3);font-family:var(--fm);margin-bottom:16px}
.dash-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm)}
.dash-card-icon{font-size:20px;margin-bottom:8px}
.dash-card-val{font-family:var(--fh);font-size:30px;font-weight:800;line-height:1}
.dash-card.orange .dash-card-val{color:var(--accent)}
.dash-card.green  .dash-card-val{color:var(--green)}
.dash-card.blue   .dash-card-val{color:var(--blue)}
.dash-card.red    .dash-card-val{color:var(--red)}
.dash-card-lbl{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PENDING HOT LIST — components/dashboard/PendingHotList.jsx
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.hot-list-section{margin:0 0 20px}
.hot-list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hot-list-title{font-family:var(--fh);font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.hot-badge{background:var(--red);color:#fff;font-size:10px;font-weight:800;font-family:var(--fm);padding:2px 8px;border-radius:20px;letter-spacing:.3px}
.hot-list-sub{font-size:11px;color:var(--text3);font-family:var(--fm)}
.hot-empty{background:var(--green-lt);border:1px solid #86efac;border-radius:var(--r);padding:16px;text-align:center}
.hot-empty-icon{font-size:24px;margin-bottom:6px}
.hot-empty-text{font-size:13px;font-weight:600;color:var(--green)}
.hot-empty-sub{font-size:11px;color:var(--green);opacity:.8;margin-top:3px}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PENDING CARD — components/dashboard/PendingCard.jsx
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.pending-card{
  background:var(--bg2);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  padding:14px;
  margin-bottom:10px;
  box-shadow:var(--shadow-sm);
  animation:slideIn .3s ease;
  position:relative;
  overflow:hidden;
}
.pending-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  border-radius:4px 0 0 4px;
}
.pending-card.overdue::before{background:var(--red)}
.pending-card.aging::before{background:var(--amber)}
.pending-card.appt::before{background:var(--green)}

/* Urgency strip */
.urgency-strip{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.urgency-badge{
  font-size:10px;font-family:var(--fm);font-weight:700;
  padding:3px 9px;border-radius:20px;letter-spacing:.3px;
}
.urgency-badge.overdue{background:var(--red-lt);color:var(--red);border:1px solid #fecaca}
.urgency-badge.aging  {background:var(--amber-lt);color:var(--amber);border:1px solid #fde68a}
.urgency-badge.appt   {background:var(--green-lt);color:var(--green);border:1px solid #86efac}
.priority-score{
  font-family:var(--fm);font-size:10px;font-weight:700;
  color:var(--text3);
}
.priority-score span{color:var(--accent)}

/* Card body */
.pc-accno{font-family:var(--fh);font-size:14px;font-weight:800;color:var(--accent);margin-bottom:2px}
.pc-name {font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.pc-phone{font-family:var(--fm);font-size:13px;color:var(--green);font-weight:600;margin-bottom:4px}
.pc-addr {font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:6px}
.pc-meta {display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.pc-chip {
  font-size:10px;font-family:var(--fm);padding:3px 8px;
  border-radius:20px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text2);
}
.pc-chip.age{background:var(--amber-lt);color:var(--amber);border-color:#fde68a}
.pc-chip.appt-chip{background:var(--green-lt);color:var(--green);border-color:#86efac}
.pc-chip.status{background:var(--accent-lt);color:var(--accent);border-color:rgba(249,115,22,.3)}
.pc-remark{
  font-size:11px;color:var(--text3);font-style:italic;
  background:var(--bg3);border-radius:8px;padding:6px 10px;
  margin-bottom:10px;border-left:2px solid var(--border2);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   EXEC RESPONSIBILITY STRIP
   components/dashboard/SharedResponsibility.jsx
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.exec-strip{
  background:linear-gradient(135deg,#eff6ff,#f0f9ff);
  border:1px solid #bfdbfe;
  border-radius:10px;
  padding:10px 12px;
  margin-bottom:10px;
}
.exec-strip-label{
  font-size:10px;font-family:var(--fm);
  color:var(--blue);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:6px;
  display:flex;align-items:center;gap:5px;
}
.exec-strip-body{display:flex;align-items:center;justify-content:space-between;gap:8px}
.exec-info{display:flex;align-items:center;gap:8px}
.exec-avatar{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),#2563eb);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-weight:800;font-size:11px;color:#fff;
  flex-shrink:0;
}
.exec-name{font-size:13px;font-weight:700;color:var(--text)}
.exec-id  {font-size:10px;font-family:var(--fm);color:var(--text3)}
.exec-action-btns{display:flex;gap:6px}
.exec-btn{
  height:30px;padding:0 10px;border-radius:8px;
  border:1.5px solid;font-size:11px;font-family:var(--fh);font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:4px;
  transition:all .15s;white-space:nowrap;
}
.exec-btn.call{background:var(--green-lt);color:var(--green);border-color:#86efac}
.exec-btn.wa  {background:#f0fdf4;color:#15803d;border-color:#86efac}
.exec-btn:active{transform:scale(.94)}

/* Share responsibility button */
.share-btn{
  width:100%;padding:11px;
  background:linear-gradient(135deg,#eff6ff,#dbeafe);
  border:1.5px solid #93c5fd;border-radius:10px;
  color:var(--blue);font-family:var(--fh);font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .2s;
}
.share-btn:active{transform:scale(.98);background:#dbeafe}
.share-btn:hover{border-color:var(--blue)}

/* Card action row (TC's own call/log buttons) */
.pc-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.pc-btn{
  flex:1;padding:9px 6px;border-radius:10px;
  font-size:11px;font-family:var(--fh);font-weight:700;
  border:1.5px solid;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px;
}
.pc-btn.call{background:var(--green-lt);color:var(--green);border-color:#86efac}
.pc-btn.wa  {background:var(--green-lt);color:#15803d;border-color:#86efac}
.pc-btn.log {background:var(--accent-lt);color:var(--accent);border-color:rgba(249,115,22,.3)}
.pc-btn:active{transform:scale(.96)}

/* No exec strip */
.no-exec-strip{
  background:var(--amber-lt);border:1px solid #fde68a;
  border-radius:10px;padding:8px 12px;margin-bottom:10px;
  font-size:11px;color:var(--amber);
  display:flex;align-items:center;gap:6px;font-weight:600;
}

/* ── SPINNER ────────────────────────────────────────── */
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.spinner-sm{width:16px;height:16px;border-width:2px;border-color:rgba(249,115,22,.2);border-top-color:var(--accent)}

/* ── TOAST ──────────────────────────────────────────── */
.toast-wrap{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:400;animation:fadeUp .25s ease}
.toast-inner{background:var(--text);color:#fff;border-radius:14px;padding:13px 22px;font-size:14px;font-weight:500;white-space:nowrap;box-shadow:var(--shadow-lg);font-family:var(--fb)}
.toast-inner.success{background:var(--green)}
.toast-inner.error  {background:var(--red)}
.toast-inner.warning{background:var(--amber)}

/* ── LOADING ────────────────────────────────────────── */
.load-overlay{position:fixed;inset:0;background:rgba(248,249,251,.88);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.load-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.load-text{font-family:var(--fm);font-size:13px;color:var(--text2)}

/* ── SECTION SKELETON ───────────────────────────────── */
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--border) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── COMING SOON ────────────────────────────────────── */
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.coming-soon-icon{width:64px;height:64px;background:var(--accent-lt);border:1px solid rgba(249,115,22,.2);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px}
.coming-soon-title{font-family:var(--fh);font-size:17px;font-weight:700;margin-bottom:8px}
.coming-soon-sub{font-size:13px;color:var(--text3);line-height:1.6;max-width:260px}

/* ── ACCOUNTS TAB ─────────────────────────────────── */
.list-header{padding:12px 14px 10px;position:sticky;top:0;background:var(--bg2);z-index:10;border-bottom:1px solid var(--border)}
.list-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.list-title{font-family:var(--fh);font-size:15px;font-weight:700}
.refresh-btn{background:var(--accent-lt);border:1px solid rgba(249,115,22,.3);color:var(--accent);border-radius:8px;padding:5px 10px;font-family:var(--fh);font-size:12px;font-weight:600;cursor:pointer}
.filter-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filter-chips::-webkit-scrollbar{display:none}
.chip-btn{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg2);font-family:var(--fh);font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── ACCOUNT CARD ─────────────────────────────────── */
.account-card{margin:0 14px 10px;padding:14px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm);animation:slideIn .2s ease}

.account-card.p2{border-left:4px solid var(--amber)}

.account-card.pf{border-left:4px solid var(--green)}
.ac-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.ac-name{font-family:var(--fh);font-size:15px;font-weight:700;color:var(--text)}

.ac-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.3px;text-transform:uppercase;flex-shrink:0;margin-left:8px}

.ac-row{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);margin-bottom:3px}
.ac-appt{background:var(--accent-lt);border:1px solid rgba(249,115,22,.2);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--accent);margin-top:8px}

.ac-btn:active{transform:scale(.97)}
.ac-btn.call{background:var(--green-lt);color:var(--green);border:1.5px solid #86efac}

/* ── LOG CALL SHEET ───────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:14px 16px 36px;animation:slideIn .25s ease}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.sheet-title{font-family:var(--fh);font-size:17px;font-weight:700;margin-bottom:4px}

.og-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;padding:0 2px}

.ob:active{transform:scale(.97)}
.ob.sel-orange{border-color:var(--accent);background:var(--accent);color:#fff}

.ob.sel-red{border-color:var(--red);background:var(--red);color:#fff}

.ob.sel-purple{border-color:var(--purple);background:var(--purple);color:#fff}
.sl-label{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px}
.remark-ta{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-family:var(--fb);font-size:14px;color:var(--text);resize:none;outline:none;transition:border-color .2s;min-height:72px;background:var(--bg3)}
.remark-ta:focus{border-color:var(--accent);background:#fff}
.date-inp{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-family:var(--fb);font-size:15px;color:var(--text);outline:none;transition:border-color .2s;margin-bottom:14px;background:var(--bg3);-webkit-appearance:none}

.submit-btn{width:100%;padding:14px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--accent),var(--accent-dk));color:#fff;font-family:var(--fh);font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:8px;box-shadow:0 4px 14px rgba(249,115,22,.3)}
.submit-btn:disabled{background:var(--border);color:var(--text3);cursor:not-allowed;box-shadow:none}
.submit-btn:not(:disabled):active{transform:scale(.99)}

/* ── REPORT TAB ───────────────────────────────────── */
.rpt-header{background:linear-gradient(135deg,#1e293b,#374151);padding:18px 16px;margin-bottom:14px}

.dl-btn{background:var(--green-lt);border:1px solid #86efac;color:var(--green);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--fh)}

/* ── EARNINGS TAB ─────────────────────────────────── */
.earn-card{background:linear-gradient(135deg,var(--accent),var(--accent-dk));border-radius:var(--r);padding:20px;margin:14px;color:#fff;box-shadow:0 6px 20px rgba(249,115,22,.3)}
.earn-label{font-size:12px;color:rgba(255,255,255,.75);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}

.earn-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 14px 14px}

.earn-stat-val{font-family:var(--fh);font-size:24px;font-weight:800;color:var(--accent)}

/* scrollbar */
::-webkit-scrollbar{width:3px}

::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/constants.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CONFIG = {
  API_URL:      'https://script.google.com/macros/s/AKfycbyRb7oEMdppJKouU5xCAQVq-IauFaugqXslscYChoFaXkvWzIQzHCg9q5u3AZWAlxB_Pg/exec',
  CLIENT_ID:    'VOA_CBE',
  SESSION_KEY:  'voa_session_tc',
  REFRESH_MS:   25 * 60 * 1000,
  ALLOWED_ROLE: 'TELECALLER',
  APP_VERSION:  'v3.0.0',
  CITY_DEFAULT: 'CBE',
  // Aging thresholds
  AGING_HOURS:  48,   // Show in hot list after 48h idle
  OVERDUE_FLAG: true, // Show overdue appointments
};

const NAV_ITEMS = [
  { id:'dash',     icon:'🏠', label:'Home'     },
  { id:'accounts', icon:'📋', label:'Accounts' },
  { id:'earnings', icon:'💰', label:'Earnings' },
  { id:'report',   icon:'📊', label:'Report'   },
];

const STAT_CARDS = [
  { id:'total',   cls:'orange', icon:'📋', label:'My Accounts'   },
  { id:'appt',    cls:'green',  icon:'📅', label:'Appts Fixed'   },
  { id:'called',  cls:'blue',   icon:'📞', label:'Calls Today'   },
  { id:'pending', cls:'red',    icon:'⚡', label:'Still Pending' },
];

// Status → human label map
const STATUS_LABELS = {
  FRESH:'Fresh', CALLED:'Called', APPT_FIXED:'Appt Fixed',
  NOT_VISITED:'Not Visited', RESCHEDULED:'Rescheduled',
  NOT_REACHABLE:'Not Reachable', STRIKE_1:'Strike 1',
  STRIKE_2:'Strike 2', STRIKE_3:'Strike 3',
  ISSUE_REFUND:'Refund Issue', ISSUE_RECONNECTION:'Reconnection',
  ISSUE_MAIL:'Mail Confirm', ISSUE_JBOX:'JBox Issue', ISSUE_ADDR:'Addr Change'
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/api.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Api = {
  async get(params) {
    const url = new URL(CONFIG.API_URL);
    url.searchParams.append('client_id', CONFIG.CLIENT_ID);
    Object.entries(params).forEach(([k,v]) => url.searchParams.append(k, String(v)));
    const res  = await fetch(url.toString());
    if (!res.ok) throw new Error('Network error: ' + res.status);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Request failed');
    return json.data;
  },
  async post(body) {
    const r = await fetch(CONFIG.API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ client_id: CONFIG.CLIENT_ID, ...body })
    });
    if (!r.ok) throw new Error('Network error: ' + r.status);
    const j = await r.json();
    if (!j.success) throw new Error(j.error || 'Request failed');
    return j.data;
  }
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/session.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SessionStore = {
  save(data) { try { localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify(data)); } catch {} },
  load() {
    try {
      const raw = localStorage.getItem(CONFIG.SESSION_KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      const parts = (s.token || '').split('|');
      if (parts.length !== 5 || Date.now() > parseInt(parts[4])) { this.clear(); return null; }
      return s;
    } catch { return null; }
  },
  clear() { try { localStorage.removeItem(CONFIG.SESSION_KEY); } catch {} }
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/utils.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Utils = {
  getGreeting() {
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    return 'Good evening';
  },
  getDateStr() {
    return new Date().toLocaleDateString('en-IN', {
      weekday:'long', day:'numeric', month:'long', year:'numeric'
    });
  },
  sanitizePin: (v) => String(v).replace(/\D/g,'').slice(0,4),
  firstName:   (n) => (n||'').split(' ')[0],
  initials:    (n) => (n||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),
  hoursAgo(isoStr) {
    if (!isoStr) return 0;
    return Math.round((Date.now() - new Date(isoStr).getTime()) / 3600000);
  },
  formatHours(h) {
    if (h < 24) return h + 'h ago';
    return Math.floor(h/24) + 'd ago';
  },
  buildWALink(mobile, msg) {
    const m = String(mobile).replace(/\D/g,'');
    const num = m.length === 10 ? '91' + m : m;
    return `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
  },
  buildCallLink(mobile) {
    return 'tel:' + String(mobile).replace(/\D/g,'');
  },
  todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  }
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  OUTCOME GROUPS — for LogCallSheet
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const OUTCOME_GROUPS = [
  { title:'Connected',       color:'green',  items:[
    { label:'✅ Appt Fixed',       value:'Appt Fixed',       needsDate:true  },
    { label:'📞 Called / Spoke',   value:'Called',           needsDate:false },
  ]},
  { title:'Rescheduled',     color:'amber',  items:[
    { label:'📅 Rescheduled',      value:'Rescheduled',      needsDate:false },
    { label:'✈️ Out of Station',   value:'Out of Station',   needsDate:false },
    { label:'🔁 Call Back',        value:'Call Back Request',needsDate:false },
  ]},
  { title:'Not Reachable',   color:'red',    items:[
    { label:'📴 Switch Off',       value:'Switch Off',       needsDate:false },
    { label:'📵 RNR / Busy',       value:'RNR / Busy',       needsDate:false },
    { label:'🚫 Incoming Barred',  value:'Incoming Barred',  needsDate:false },
  ]},
  { title:'Issues',          color:'purple', items:[
    { label:'💰 Refund Issue',     value:'Refund Issue',     needsDate:false },
    { label:'🔌 Reconnection',     value:'Reconnection',     needsDate:false },
    { label:'📧 Mail Confirm',     value:'Mail Confirmation',needsDate:false },
    { label:'📦 Junction Box',     value:'Junction Box Issue',needsDate:false},
    { label:'📍 Address Change',   value:'Address Change',   needsDate:false },
  ]},
  { title:'Non Recoverable', color:'red',    items:[
    { label:'❌ Wrong Number',     value:'Wrong Number',     needsDate:false },
    { label:'🏠 Not Willing',      value:'Not Willing',      needsDate:false },
    { label:'📍 Addr Not Found',   value:'Address Not Found',needsDate:false },
    { label:'✅ Already Collected',value:'Already Collected',needsDate:false },
  ]},
];
const ALL_OUTCOMES = OUTCOME_GROUPS.flatMap(g => g.items);

const getStatusBadgeClass = (s) => {
  if (s==='FRESH')          return 'sb-fresh';
  if (s==='CALLED')         return 'sb-called';
  if (s==='APPT_FIXED')     return 'sb-appt';
  if (s==='RESCHEDULED')    return 'sb-rescheduled';
  if (s==='NOT_REACHABLE'||s==='NOT_VISITED') return 'sb-nr';
  if (s.startsWith('ISSUE_'))  return 'sb-issue';
  if (s.startsWith('STRIKE_')) return 'sb-strike';
  if (s.startsWith('NR_'))     return 'sb-nr';
  return 'sb-fresh';
};
const getCardPriClass = (p) => p<=1?'p1':p<=2?'p2':p<=3?'p3':'pf';
const todayStr = () => new Date().toISOString().split('T')[0];
const tomorrowStr = () => { const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; };

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 hooks/usePendingAccounts.js
//  Fetches TC accounts and builds hot list + stats
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function usePendingAccounts(session) {
  const [accounts,  setAccounts]  = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [error,     setError]     = useState(null);
  const [lastFetch, setLastFetch] = useState(null);

  const fetch = useCallback(async () => {
    if (!session) return;
    setLoading(true);
    setError(null);
    try {
      const data = await Api.get({
        action:  'get_tc_accounts',
        city:    session.city,
        staffId: session.staffId,
        token:   session.token
      });
      setAccounts(Array.isArray(data) ? data : []);
      setLastFetch(Date.now());
    } catch (e) {
      setError(e.message);
      setAccounts([]);
    } finally {
      setLoading(false);
    }
  }, [session]);

  useEffect(() => { fetch(); }, [fetch]);

  // Derived stats
  const stats = useMemo(() => {
    const today = Utils.todayStr();
    return {
      total:   accounts.length,
      appt:    accounts.filter(a => a.status === 'APPT_FIXED').length,
      called:  accounts.filter(a => {
        const ts = a.lastActionTime || a.last_action_time || '';
        return ts.startsWith(today);
      }).length,
      pending: accounts.filter(a => !['COLLECTED','NR_OWN','NR_WRONG_NO','NR_ADDR','STRIKE_3'].includes(a.status)).length
    };
  }, [accounts]);

  // Hot list: aging (>48h) + overdue appointments — sorted by priority score desc
  const hotList = useMemo(() => {
    const today = Utils.todayStr();
    return accounts
      .filter(a => {
        const terminal = ['COLLECTED','NR_OWN','NR_WRONG_NO','NR_ADDR','STRIKE_3'];
        if (terminal.includes(a.status)) return false;
        if (['COOLING','COOLING_POOL'].includes(a.status)) return false;
        const ageHours = Utils.hoursAgo(a.pendingSince || a.pending_since);
        const isAging  = ageHours >= CONFIG.AGING_HOURS;
        const isOverdue= a.apptDate && a.apptDate < today && a.status === 'APPT_FIXED';
        return isAging || isOverdue;
      })
      .map(a => {
        const today = Utils.todayStr();
        const ageH  = Utils.hoursAgo(a.pendingSince || a.pending_since);
        const isOverdue = a.apptDate && a.apptDate < today && a.status === 'APPT_FIXED';
        const isApptToday = a.apptDate === today;
        return {
          ...a,
          _ageHours: ageH,
          _urgency:  isOverdue ? 'overdue' : isApptToday ? 'appt' : 'aging'
        };
      })
      .sort((a, b) => (b.priorityScore || b.priority_score || 0) - (a.priorityScore || a.priority_score || 0))
      .slice(0, 10); // Cap at 10 on dashboard
  }, [accounts]);

  return { accounts, hotList, stats, loading, error, refresh: fetch, lastFetch };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 hooks/useAuth.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useAuth({ onSuccess, onError }) {
  const [loading, setLoading] = useState(false);
  const login = useCallback(async (staffId, pin, city) => {
    setLoading(true);
    try {
      const data = await Api.get({
        action: 'login', city: city || CONFIG.CITY_DEFAULT,
        staffId: String(staffId).trim().toUpperCase(), pin: pin.trim()
      });
      if (data.role !== CONFIG.ALLOWED_ROLE) throw new Error('This app is for Telecallers only');
      const session = {
        token: data.token, staffId: data.staffId, staffName: data.staffName,
        role: data.role, city: data.city, clientId: data.clientId, loginAt: Date.now()
      };
      SessionStore.save(session);
      onSuccess(session);
    } catch (e) {
      const msg = e.message.includes('Invalid') ? 'Invalid Staff ID or PIN'
                : e.message.includes('attempts') ? 'Too many attempts. Wait 10 min.'
                : e.message || 'Login failed';
      onError(msg);
    } finally { setLoading(false); }
  }, [onSuccess, onError]);
  return { login, loading };
}

//  📁 hooks/useToast.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useToast() {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, type='error') => setToast({ msg, type }), []);
  const hide = useCallback(() => setToast(null), []);
  return { toast, showToast: show, hideToast: hide };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 hooks/useTokenRefresh.js
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useTokenRefresh(session, onExpired) {
  const timerRef = useRef(null);
  useEffect(() => {
    if (!session) return;
    timerRef.current = setInterval(async () => {
      try {
        const data = await Api.get({ action:'login', city:session.city, staffId:session.staffId, token:session.token });
        SessionStore.save({ ...session, token: data.token, loginAt: Date.now() });
      } catch { onExpired(); }
    }, CONFIG.REFRESH_MS);
    return () => clearInterval(timerRef.current);
  }, [session]);
}

  const needsDate = selOut?.needsDate;

  const getSelClass = (group) => {
    const m = {Connected:'sel-green',Rescheduled:'sel-amber','Not Reachable':'sel-red',Issues:'sel-purple','Non Recoverable':'sel-red'};
    return m[group] || 'sel-orange';
  };

  const handleSubmit = async () => {
    if (!outcome) { showToast('Select an outcome','error'); return; }
    if (needsDate && !apptDate) { showToast('Select appointment date','error'); return; }
    setLoading(true);
    try {
      await Api.post({
        action:'log_call', token:session.token,
        city:session.city, staffId:session.staffId,
        accountNo:account.accountNo, outcome,
        tcRemark:remark, apptDate:needsDate?apptDate:''
      });
      onSuccess(account.name + ' → ' + outcome);
      onClose();
    } catch(e) { showToast(e.message,'error'); }
    finally { setLoading(false); }
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div className="sheet-title">Log Call Outcome</div>
        <div className="sheet-sub">Record the result of your call</div>
        <div className="sheet-cust">
          <div className="sheet-cust-name">{account.name}</div>
          <div className="sheet-cust-acc">📞 {account.mobile} · {account.accountNo}</div>
        </div>
        {OUTCOME_GROUPS.map(g => (
          <div key={g.title} style={{marginBottom:12}}>
            <div className="og-title">{g.title}</div>
            <div className="og-grid">
              {g.items.map(item => (
                <button key={item.value}
                  className={`ob${outcome===item.value?' '+getSelClass(g.title):''}`}
                  onClick={()=>setOutcome(item.value)}>
                  {item.label}
                </button>
              ))}
            </div>
          </div>
        ))}
        {needsDate && (
          <>
            <div className="sl-label" style={{marginBottom:7}}>Appointment Date</div>
            <input type="date" className="date-inp" value={apptDate}
              min={todayStr()} onChange={e=>setApptDate(e.target.value)}/>
          </>
        )}
        <div className="sl-label" style={{marginBottom:7}}>Remark (optional)</div>
        <textarea className="remark-ta" value={remark}
          onChange={e=>setRemark(e.target.value)}
          placeholder="Add notes about this call…" rows={3}/>
        <button className="submit-btn" onClick={handleSubmit}
          disabled={!outcome||loading}>
          {loading?'Saving…':'✅ Submit Outcome'}
        </button>
        <div className="cancel-lnk" onClick={onClose}>Cancel</div>
      </div>
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ACCOUNT CARD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const FILTERS_LIST = [
  {label:'All',value:null},{label:'Fresh',value:'FRESH'},
  {label:'Called',value:'CALLED'},{label:'Appt Fixed',value:'APPT_FIXED'},
  {label:'Rescheduled',value:'RESCHEDULED'},{label:'Not Reached',value:'NOT_REACHABLE'},
];

const AccountCard = ({ account, onLog }) => {
  const [expanded,setExpanded] = useState(false);
  const p = account.smartQueuePriority||account.smart_queue_priority||6;

  const call = () => { window.location.href='tel:'+account.mobile.replace(/\D/g,''); };
  const wa   = () => {
    const msg = encodeURIComponent(`Hi, I'm calling from VOA regarding your ACT Fiber router. Account: ${account.accountNo}. Please call back or respond. Thank you.`);
    window.open(`https://wa.me/91${account.mobile.replace(/\D/g,'')}?text=${msg}`,'_blank');
  };

  return (
    <div className={`account-card ${getCardPriClass(p)}`} onClick={()=>setExpanded(e=>!e)}>
      <div className="ac-top">
        <div>
          <div className="ac-name">{account.name}</div>
          <div className="ac-no">{account.accountNo}</div>
        </div>
        <span className={`ac-badge ${getStatusBadgeClass(account.status)}`}>
          {STATUS_LABELS[account.status]||account.status}
        </span>
      </div>
      <div>
        <div className="ac-row"><span>📞</span><span>{account.mobile}</span></div>
        {expanded && (
          <>
            <div className="ac-row"><span>📍</span><span>{account.address}, {account.area}</span></div>
            {account.srNumber&&<div className="ac-row"><span>🎫</span><span>SR: {account.srNumber}</span></div>}
            {account.tcRemark&&<div className="ac-row" style={{color:'var(--text3)'}}><span>💬</span><span>{account.tcRemark}</span></div>}
          </>
        )}
      </div>
      {account.apptDate&&<div className="ac-appt">📅 Appointment: <strong>{account.apptDate}</strong></div>}
      {account.strikeCount>0&&(
        <div className="ac-strikes">
          {[1,2,3].map(i=><div key={i} className={`sd ${i<=account.strikeCount?'on':'off'}`}/>)}
          <span style={{fontSize:11,color:'var(--red)',marginLeft:4,fontWeight:600}}>{account.strikeCount} strike{account.strikeCount>1?'s':''}</span>
        </div>
      )}
      <div className="ac-actions" onClick={e=>e.stopPropagation()}>
        <button className="ac-btn call" onClick={call}>📞 Call</button>
        <button className="ac-btn wa"   onClick={wa  }>💬 WA</button>
        <button className="ac-btn log"  onClick={()=>onLog(account)}>✏️ Log</button>
      </div>
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ACCOUNTS PAGE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const AccountsPage = ({ session, showToast }) => {
  const [accounts,setAccounts] = useState([]);
  const [loading, setLoading]  = useState(true);
  const [filter,  setFilter]   = useState(null);
  const [logTarget,setLogTarget]= useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const d = await Api.get({action:'get_tc_accounts',token:session.token,staffId:session.staffId,city:session.city});
      setAccounts(Array.isArray(d)?d:[]);
    } catch(e) { showToast(e.message,'error'); }
    finally { setLoading(false); }
  },[session]);

  useEffect(()=>{load();},[load]);

  const filtered = useMemo(()=>filter?accounts.filter(a=>a.status===filter):accounts,[accounts,filter]);

  return (
    <div>
      <div className="list-header">
        <div className="list-header-top">
          <div className="list-title">My Accounts <span style={{color:'var(--text3)',fontSize:13}}>({filtered.length})</span></div>
          <button className="refresh-btn" onClick={load}>↻ Refresh</button>
        </div>
        <div className="filter-chips">
          {FILTERS_LIST.map(f=>(
            <button key={f.label} className={`chip-btn${filter===f.value?' active':''}`}
              onClick={()=>setFilter(f.value)}>{f.label}</button>
          ))}
        </div>
      </div>
      <div style={{paddingTop:10}}>
        {loading?[1,2,3].map(i=><div key={i} style={{height:100,margin:'0 14px 10px',borderRadius:'var(--r)'}} className="skeleton"/>):
         filtered.length===0?<div className="coming-soon">
           <div className="coming-soon-icon">📭</div>
           <div className="coming-soon-title">{filter?'No accounts with this status':'No accounts assigned'}</div>
           <div className="coming-soon-sub">{filter?'Try a different filter':'Accounts appear here after admin uploads and allocates the base.'}</div>
         </div>:
         filtered.map(a=><AccountCard key={a.accountNo} account={a} onLog={setLogTarget}/>)
        }
      </div>
      {logTarget&&<LogCallSheet account={logTarget} session={session} onClose={()=>setLogTarget(null)}
        onSuccess={msg=>{showToast(msg,'success');load();}} showToast={showToast}/>}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  EARNINGS PAGE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const EarningsPage = ({ session, showToast }) => {
  const [data,setData] = useState(null);
  const [loading,setLoading] = useState(true);

  useEffect(()=>{
    Api.get({action:'get_tc_earnings',token:session.token,staffId:session.staffId})
      .then(d=>setData(d)).catch(e=>showToast(e.message,'error'))
      .finally(()=>setLoading(false));
  },[]);

  if(loading) return <div style={{padding:14}}>{[1,2,3].map(i=><div key={i} style={{height:80,borderRadius:'var(--r)',marginBottom:10}} className="skeleton"/>)}</div>;

  const pct = data?.targetPercent||0;
  return (
    <div>
      <div className="earn-card">
        <div className="earn-label">MTD Earnings</div>
        <div className="earn-amount">₹{(data?.mtdEarned||0).toLocaleString('en-IN')}</div>
        <div className="earn-sub">From {data?.mtdCollected||0} collections · ₹{data?.ratePerCollection||300}/collection</div>
      </div>
      <div className="earn-prog-wrap">
        <div className="earn-prog-label">
          <span>Monthly Target Progress</span>
          <span style={{color:'var(--accent)',fontFamily:'var(--fm)'}}>{pct}%</span>
        </div>
        <div className="earn-prog-bar">
          <div className="earn-prog-fill" style={{width:Math.min(pct,100)+'%'}}/>
        </div>
        <div style={{fontSize:11,color:'var(--text3)',marginTop:6,fontFamily:'var(--fm)'}}>
          {data?.mtdCollected||0} of {data?.monthlyTarget||0} collections
        </div>
      </div>
      <div className="earn-stat-grid">
        <div className="earn-stat">
          <div className="earn-stat-val">{data?.mtdCollected||0}</div>
          <div className="earn-stat-lbl">Collections MTD</div>
        </div>
        <div className="earn-stat">
          <div className="earn-stat-val">{data?.nudgeClosures||0}</div>
          <div className="earn-stat-lbl">More to Target</div>
        </div>
        <div className="earn-stat">
          <div className="earn-stat-val" style={{fontSize:18}}>₹{(data?.nudgeAmount||0).toLocaleString('en-IN')}</div>
          <div className="earn-stat-lbl">If Target Hit</div>
        </div>
        <div className="earn-stat">
          <div className="earn-stat-val">{data?.monthlyTarget||0}</div>
          <div className="earn-stat-lbl">Monthly Target</div>
        </div>
      </div>
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  REPORT PAGE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const ReportPage = ({ session, showToast }) => {
  const [report,setReport] = useState(null);
  const [loading,setLoading] = useState(true);

  const load = useCallback(async()=>{
    setLoading(true);
    try {
      const d = await Api.get({action:'get_tc_daily_report',token:session.token,staffId:session.staffId,city:session.city});
      setReport(d);
    } catch(e) { showToast(e.message,'error'); }
    finally { setLoading(false); }
  },[session]);

  useEffect(()=>{load();},[load]);

  const download = () => {
    if(!report?.reportRows?.length){showToast('No calls today to download','error');return;}
    const ws = XLSX.utils.json_to_sheet(report.reportRows.map(r=>({
      'Account No':r.accountNo,'Name':r.name,'Mobile':r.mobile,
      'Outcome':r.outcome,'Remark':r.remark,'Appt Date':r.apptDate,'Time':r.timestamp
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Daily Report');
    XLSX.writeFile(wb,`TC_Report_${session.staffId}_${report.date||'today'}.xlsx`);
    showToast('Report downloaded','success');
  };

  if(loading) return <div style={{padding:14}}>{[1,2,3].map(i=><div key={i} style={{height:60,borderRadius:10,marginBottom:8}} className="skeleton"/>)}</div>;

  return (
    <div>
      <div className="rpt-header">
        <div className="rpt-date">{report?.date||'Today'}</div>
        <div className="rpt-title">Daily Call Report</div>
        <div className="rpt-stats">
          <div className="rpt-stat"><div className="rpt-val">{report?.callsToday||0}</div><div className="rpt-lbl">Calls Today</div></div>
          <div className="rpt-stat"><div className="rpt-val">{report?.apptFixed||0}</div><div className="rpt-lbl">Appt Fixed</div></div>
          <div className="rpt-stat"><div className="rpt-val">{report?.totalAssigned||0}</div><div className="rpt-lbl">Total</div></div>
        </div>
      </div>
      {report?.reportRows?.length>0?(
        <div className="rpt-section">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--text2)',letterSpacing:'.5px',textTransform:'uppercase'}}>Call Log</div>
            <button className="dl-btn" onClick={download}>📥 Download</button>
          </div>
          {report.reportRows.map((r,i)=>(
            <div key={i} className="rpt-row">
              <div className="rpt-time">{(r.timestamp||'--').slice(11,16)}</div>
              <div className="rpt-info">
                <div className="rpt-aname">{r.name}</div>
                <div className="rpt-outcome">{r.outcome}{r.remark?' · '+r.remark:''}</div>
              </div>
            </div>
          ))}
        </div>
      ):(
        <div className="coming-soon">
          <div className="coming-soon-icon">📊</div>
          <div className="coming-soon-title">No calls logged today</div>
          <div className="coming-soon-sub">Calls you log will appear here.</div>
        </div>
      )}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 app/(authenticated)/layout.jsx  — AppShell
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const AppShell = ({ session, onLogout }) => {
  const [activePage, setActivePage] = useState('dash');
  const { toast, showToast, hideToast } = useToast();

  // Re-fetch accounts for nav badge count
  const { hotList } = usePendingAccounts(session);

  const handleLogout = useCallback(() => {
    SessionStore.clear();
    onLogout();
  }, [onLogout]);

  useTokenRefresh(session, handleLogout);

  return (
    <div className="app">
      <AppHeader session={session} onLogout={handleLogout} />

      <div className="main-content">
        <div className={`page${activePage==='dash'     ?' on':''}`}>
          <DashboardPage session={session} showToast={showToast} />
        </div>
        <div className={`page${activePage==='accounts' ?' on':''}`}>
          <AccountsPage session={session} showToast={showToast} onRefreshDash={()=>{}} />
        </div>
        <div className={`page${activePage==='earnings' ?' on':''}`}>
          <EarningsPage session={session} showToast={showToast} />
        </div>
        <div className={`page${activePage==='report'   ?' on':''}`}>
          <ReportPage session={session} showToast={showToast} />
        </div>
      </div>

      <BottomNav
        active={activePage}
        onChange={setActivePage}
        hotCount={hotList.length}
      />

      {toast && <Toast msg={toast.msg} type={toast.type} onDone={hideToast} />}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 components/auth/LoginCard.jsx
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const LoginCard = ({ onLogin }) => {
  const [staffId, setStaffId] = useState('');
  const [city,    setCity]    = useState('CBE');
  const [pin,     setPin]     = useState('');
  const [error,   setError]   = useState('');
  const [shaking, setShaking] = useState(false);
  const { toast, showToast, hideToast } = useToast();

  const shake = useCallback(() => {
    setShaking(true); setTimeout(() => setShaking(false), 450);
  }, []);

  const { login, loading } = useAuth({
    onSuccess: onLogin,
    onError: (msg) => { shake(); setError(msg); showToast(msg,'error'); setPin(''); }
  });

  const handleSubmit = useCallback(() => {
    if (!staffId.trim()) { showToast('Enter your Staff ID'); return; }
    if (pin.length < 4)  { showToast('Enter your 4-digit PIN'); return; }
    setError('');
    login(staffId, pin, city);
  }, [staffId, pin, city, login]);

  useEffect(() => {
    if (pin.length === 4 && staffId.trim()) {
      const t = setTimeout(handleSubmit, 80);
      return () => clearTimeout(t);
    }
  }, [pin, staffId]);

  return (
    <div className="login-screen">
      <div className={`login-card${shaking?' shake':''}`}>
        <div className="login-logo-wrap">
          <BrandLogo size="lg" />
          <div className="login-title">Telecaller Console</div>
          <div className="login-sub">CollectPro · VOA Recovery Operations</div>
        </div>

        <div className="form-group">
          <label className="form-label">City</label>
          <select className="form-input" value={city} onChange={e => setCity(e.target.value)} disabled={loading}
            style={{WebkitAppearance:'none',appearance:'none'}}>
            <option value="CBE">Coimbatore (CBE)</option>
            <option value="CHN">Chennai (CHN)</option>
          </select>
        </div>

        <div className="form-group">
          <label className="form-label">Staff ID</label>
          <input className="form-input" type="text" value={staffId}
            onChange={e => setStaffId(e.target.value.toUpperCase())}
            onKeyDown={e => e.key==='Enter' && handleSubmit()}
            placeholder="e.g. TC_001" autoCapitalize="characters"
            autoCorrect="off" spellCheck={false} disabled={loading} />
        </div>

        <div className="form-group" style={{marginBottom:8}}>
          <label className="form-label">PIN</label>
          <input className="form-input pin-field" type="password"
            inputMode="numeric" pattern="[0-9]*" maxLength={4} value={pin}
            onChange={e => setPin(Utils.sanitizePin(e.target.value))}
            onKeyDown={e => e.key==='Enter' && handleSubmit()}
            placeholder="• • • •" disabled={loading} />
        </div>

        <PinDots length={pin.length} />

        <button className="btn-login" onClick={handleSubmit} disabled={loading}>
          {loading ? <><div className="spinner"/><span>Signing in...</span></> : 'Sign In →'}
        </button>

        {error && <div className="login-error">{error}</div>}
      </div>
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={hideToast} />}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 app/page.jsx — Root auth gate
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const App = () => {
  const [session,  setSession]  = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    const saved = SessionStore.load();
    if (saved) setSession(saved);
    setChecking(false);
  }, []);

  if (checking) return (
    <div className="load-overlay">
      <div className="load-spinner"/>
      <div className="load-text">CollectPro loading...</div>
    </div>
  );

  return session
    ? <AppShell session={session} onLogout={() => setSession(null)} />
    : <LoginCard onLogin={s => setSession(s)} />;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

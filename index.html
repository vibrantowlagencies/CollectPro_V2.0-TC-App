<style>
/*
 * ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

/* ── DESIGN TOKENS — lib/constants.js → THEME object ── */
:root{
  /* Backgrounds */
  --bg        : #f8f9fb;
  --bg2       : #ffffff;
  --bg3       : #f1f4f8;
  /* Brand */
  --accent    : #f97316;
  --accent-lt : #fff4ed;
  --accent-dk : #ea6c0a;
  /* Semantic colors */
  --blue      : #3b82f6;  --blue-lt  : #eff6ff;
  --green     : #16a34a;  --green-lt : #f0fdf4;
  --red       : #dc2626;  --red-lt   : #fef2f2;
  --amber     : #d97706;  --amber-lt : #fffbeb;
  --purple    : #7c3aed;  --purple-lt: #f5f3ff;
  --cyan      : #0891b2;  --cyan-lt  : #ecfeff;
  /* Structure */
  --border    : #e4e8ef;
  --border2   : #d0d7e3;
  --text      : #0f172a;
  --text2     : #475569;
  --text3     : #94a3b8;
  /* Elevation */
  --shadow-sm : 0 1px 3px rgba(0,0,0,.06);
  --shadow    : 0 4px 16px rgba(0,0,0,.08);
  --shadow-lg : 0 8px 32px rgba(0,0,0,.12);
  /* Shape */
  --r         : 14px;
  /* Typography */
  --fh        : 'Sora', sans-serif;          /* Headings  */
  --fm        : 'JetBrains Mono', monospace; /* Mono/code */
  --fb        : 'Plus Jakarta Sans',sans-serif; /* Body   */
}

/* ── BASE RESET ─────────────────────────────────────── */
*, *::before, *::after {
  margin:0; padding:0; box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html, body, #root { height:100%; width:100%; overflow:hidden; }
body {
  background:var(--bg); color:var(--text);
  font-family:var(--fb); -webkit-font-smoothing:antialiased;
}

/* ── ANIMATIONS — styles/animations.css in Next.js ─── */
@keyframes fadeUp   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn   { from{opacity:0} to{opacity:1} }
@keyframes shake    { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
@keyframes spin     { to{transform:rotate(360deg)} }
@keyframes dotPop   { 0%{transform:scale(.8);opacity:.4} 50%{transform:scale(1.2);opacity:1} 100%{transform:scale(1);opacity:1} }
@keyframes slideIn  { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ── COMPONENT STYLES ───────────────────────────────── */

/* LoginScreen → components/auth/LoginCard.jsx */
.login-screen{
  min-height:100vh; display:flex;
  align-items:center; justify-content:center;
  background:linear-gradient(145deg,#fff4ed,#f8f9fb,#fff);
  padding:24px;
}
.login-card{
  background:#fff; border:1px solid var(--border);
  border-radius:24px; padding:44px 36px;
  width:100%; max-width:390px;
  box-shadow:var(--shadow-lg);
  animation:fadeUp .4s ease;
}
.login-card.shake { animation:shake .4s ease; }

/* Logo → components/ui/BrandLogo.jsx */
.login-logo-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; margin-bottom:36px; }
.login-logo{
  width:72px; height:72px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dk));
  border-radius:20px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--fh); font-weight:800; font-size:22px; color:#fff;
  box-shadow:0 8px 28px rgba(249,115,22,.28);
  letter-spacing:.5px;
}
.login-title { font-family:var(--fh); font-size:24px; font-weight:700; color:var(--text); }
.login-sub   { font-size:13px; color:var(--text3); text-align:center; line-height:1.5; }

/* Form → components/ui/FormField.jsx */
.form-group  { margin-bottom:18px; }
.form-label  {
  font-size:11px; font-family:var(--fm);
  letter-spacing:1px; color:var(--text3);
  margin-bottom:8px; display:block; text-transform:uppercase;
}
.form-input {
  width:100%; background:var(--bg3);
  border:1.5px solid var(--border); border-radius:12px;
  padding:13px 15px; color:var(--text);
  font-family:var(--fb); font-size:15px;
  outline:none; transition:all .2s; -webkit-appearance:none;
}
.form-input:focus {
  border-color:var(--accent); background:#fff;
  box-shadow:0 0 0 3px rgba(249,115,22,.1);
}
.form-input.pin-field {
  font-family:var(--fm); font-size:22px;
  text-align:center; letter-spacing:.3em;
}

/* PinDots → components/ui/PinDots.jsx */
.pin-dots { display:flex; gap:10px; justify-content:center; margin:4px 0 20px; }
.pin-dot  {
  width:12px; height:12px; border-radius:50%;
  border:2px solid var(--border2); background:transparent;
  transition:all .15s ease;
}
.pin-dot.filled {
  background:var(--accent); border-color:var(--accent);
  animation:dotPop .2s ease;
}

/* Button → components/ui/Button.jsx */
.btn-login{
  width:100%; padding:15px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dk));
  border:none; border-radius:14px; color:#fff;
  font-family:var(--fh); font-size:17px; font-weight:700;
  cursor:pointer; box-shadow:0 4px 20px rgba(249,115,22,.3);
  transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-login:active  { transform:scale(.98); }
.btn-login:disabled{ opacity:.55; cursor:not-allowed; box-shadow:none; }

/* Inline error */
.login-error{
  background:var(--red-lt); border:1px solid rgba(220,38,38,.2);
  border-radius:10px; padding:11px 14px;
  font-size:13px; color:var(--red);
  margin-top:12px; animation:fadeIn .2s ease; text-align:center;
}

/* Spinner → components/ui/Spinner.jsx */
.spinner{
  width:20px; height:20px;
  border:2.5px solid rgba(255,255,255,.3); border-top-color:#fff;
  border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0;
}

/* AppHeader → components/layout/AppHeader.jsx */
.app   { display:flex; flex-direction:column; height:100vh; }
.header{
  background:var(--bg2); border-bottom:1px solid var(--border);
  padding:0 16px; height:56px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
  box-shadow:var(--shadow-sm); flex-shrink:0;
}
.brand        { display:flex; align-items:center; gap:10px; }
.brand-logo   {
  width:34px; height:34px;
  background:linear-gradient(135deg,var(--accent),var(--accent-dk));
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-family:var(--fh); font-weight:800; font-size:11px; color:#fff; letter-spacing:.5px;
}
.brand-name   { font-family:var(--fh); font-size:16px; font-weight:700; color:var(--text); }
.brand-role   {
  font-family:var(--fm); font-size:10px;
  color:var(--accent); background:var(--accent-lt);
  padding:3px 9px; border-radius:20px;
  border:1px solid rgba(249,115,22,.2); letter-spacing:.5px;
}
.hdr-right    { display:flex; align-items:center; gap:8px; }
.staff-badge  {
  font-family:var(--fm); font-size:11px;
  color:var(--text2); background:var(--bg3);
  padding:5px 10px; border-radius:8px; border:1px solid var(--border);
}
.city-badge   {
  font-family:var(--fm); font-size:10px; font-weight:700;
  color:var(--accent); background:var(--accent-lt);
  padding:4px 9px; border-radius:20px;
  border:1px solid rgba(249,115,22,.2); letter-spacing:.5px;
}
.logout-btn   {
  background:none; border:1px solid var(--border);
  border-radius:8px; color:var(--text3);
  cursor:pointer; padding:5px 10px;
  font-size:12px; font-family:var(--fb); transition:all .15s;
}
.logout-btn:hover { border-color:var(--red); color:var(--red); }

/* BottomNav → components/layout/BottomNav.jsx */
.bnav{
  display:flex; background:var(--bg2);
  border-top:1px solid var(--border);
  height:60px; flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom);
}
.ni{
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:3px; border:none; background:none;
  cursor:pointer; color:var(--text3);
  font-size:10px; font-family:var(--fb); font-weight:600;
  transition:color .2s; padding:0;
}
.ni .ico { font-size:20px; }
.ni.on   { color:var(--accent); }

/* Pages */
.main-content { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; position:relative; }
.page         { display:none; padding-bottom:24px; }
.page.on      { display:block; animation:fadeIn .2s ease; }

/* DashboardPage → app/dashboard/page.jsx */
.dash-wrap     { padding:16px; }
.dash-greeting { font-family:var(--fh); font-size:20px; font-weight:700; margin-bottom:2px; }
.dash-date     { font-size:12px; color:var(--text3); font-family:var(--fm); margin-bottom:16px; }
.dash-cards    { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
.dash-card     { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r); padding:16px; box-shadow:var(--shadow-sm); }
.dash-card-icon{ font-size:20px; margin-bottom:8px; }
.dash-card-val { font-family:var(--fh); font-size:30px; font-weight:800; line-height:1; }
.dash-card.orange .dash-card-val { color:var(--accent); }
.dash-card.green  .dash-card-val { color:var(--green); }
.dash-card.blue   .dash-card-val { color:var(--blue); }
.dash-card.red    .dash-card-val { color:var(--red); }
.dash-card-lbl { font-size:11px; color:var(--text3); margin-top:4px; font-weight:500; }

/* SessionCard → components/auth/SessionCard.jsx */
.session-card{
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--r); padding:16px; margin:0 16px 12px;
  box-shadow:var(--shadow-sm); animation:slideIn .3s ease;
}
.session-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 0; border-bottom:1px solid var(--border);
}
.session-row:last-child { border-bottom:none; }
.session-label { font-size:11px; color:var(--text3); font-family:var(--fm); text-transform:uppercase; letter-spacing:.5px; }
.session-value { font-size:12px; color:var(--text); font-family:var(--fm); font-weight:500; }
.token-active  { font-size:11px; color:var(--green); font-family:var(--fm); font-weight:600; display:flex; align-items:center; gap:4px; }
.token-dot     { width:7px; height:7px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }

/* ComingSoon → components/ui/ComingSoon.jsx */
.coming-soon      { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; text-align:center; }
.coming-soon-icon {
  width:64px; height:64px; background:var(--accent-lt);
  border:1px solid rgba(249,115,22,.2); border-radius:18px;
  display:flex; align-items:center; justify-content:center;
  font-size:28px; margin-bottom:16px;
}
.coming-soon-title { font-family:var(--fh); font-size:17px; font-weight:700; margin-bottom:8px; }
.coming-soon-sub   { font-size:13px; color:var(--text3); line-height:1.6; max-width:260px; }

/* Toast → components/ui/Toast.jsx */
.toast-wrap  { position:fixed; bottom:76px; left:50%; transform:translateX(-50%); z-index:400; animation:fadeUp .25s ease; }
.toast-inner {
  background:var(--text); color:#fff; border-radius:14px;
  padding:13px 22px; font-size:14px; font-weight:500;
  white-space:nowrap; box-shadow:var(--shadow-lg); font-family:var(--fb);
}
.toast-inner.success { background:var(--green); }
.toast-inner.error   { background:var(--red);   }
.toast-inner.warning { background:var(--amber); }

/* LoadingOverlay → components/ui/LoadingOverlay.jsx */
.load-overlay{
  position:fixed; inset:0; background:rgba(248,249,251,.88);
  z-index:300; display:flex; align-items:center;
  justify-content:center; flex-direction:column; gap:14px;
}
.load-spinner{
  width:40px; height:40px;
  border:3px solid var(--border); border-top-color:var(--accent);
  border-radius:50%; animation:spin .7s linear infinite;
}
.load-text { font-family:var(--fm); font-size:13px; color:var(--text2); }

/* Scrollbar */
::-webkit-scrollbar       { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

<script type="text/babel">
/*
 * ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
 *  NEXT.JS MIGRATION NOTE
 *  Each section below is tagged with its future file path.
 *  In Next.js, split this <script> into separate .jsx / .js files
 *  exactly as labeled. No logic changes needed — just copy.
 * ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
 */

const { useState, useEffect, useCallback, useRef } = React;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/constants.js
//  Next.js: import { CONFIG, THEME, NAV_ITEMS } from '@/lib/constants'
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CONFIG = {
  API_URL:      'https://script.google.com/macros/s/AKfycbyRb7oEMdppJKouU5xCAQVq-IauFaugqXslscYChoFaXkvWzIQzHCg9q5u3AZWAlxB_Pg/exec', // → Next.js: process.env.NEXT_PUBLIC_API_URL
  CLIENT_ID:    'VOA_CBE',
  SESSION_KEY:  'voa_session_tc',
  REFRESH_MS:   25 * 60 * 1000,   // 25 min
  ALLOWED_ROLE: 'TELECALLER',
  APP_VERSION:  'v2.0.0',
  CITY_DEFAULT: 'CBE',
};

const THEME = {
  accent:     '#f97316',
  accentDark: '#ea6c0a',
  green:      '#16a34a',
  red:        '#dc2626',
  blue:       '#3b82f6',
  amber:      '#d97706',
};

const NAV_ITEMS = [
  { id: 'dash',     icon: '🏠', label: 'Home'     },
  { id: 'accounts', icon: '📋', label: 'Accounts' },
  { id: 'earnings', icon: '💰', label: 'Earnings' },
  { id: 'report',   icon: '📊', label: 'Report'   },
];

const STAT_CARDS = [
  { id: 'total',   cls: 'orange', icon: '📋', label: 'My Accounts'   },
  { id: 'appt',    cls: 'green',  icon: '📅', label: 'Appts Fixed'   },
  { id: 'called',  cls: 'blue',   icon: '📞', label: 'Calls Today'   },
  { id: 'pending', cls: 'red',    icon: '⚡', label: 'Still Pending' },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/api.js
//  Next.js: import { apiGet, apiPost } from '@/lib/api'
//  In Next.js replace fetch with: import { api } from '@/lib/api'
//  and use server actions for POST operations
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Api = {
  async get(params) {
    const url = new URL(CONFIG.API_URL);
    url.searchParams.append('client_id', CONFIG.CLIENT_ID);
    Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, String(v)));
    const res  = await fetch(url.toString());
    if (!res.ok) throw new Error('Network error: ' + res.status);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Request failed');
    return json.data;
  },

  async post(params) {
    // Next.js: use server actions or route handlers for POST
    const res  = await fetch(CONFIG.API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ client_id: CONFIG.CLIENT_ID, ...params })
    });
    if (!res.ok) throw new Error('Network error: ' + res.status);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Request failed');
    return json.data;
  }
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/session.js
//  Next.js: replace localStorage with iron-session or next-auth
//  import { getSession, saveSession, clearSession } from '@/lib/session'
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SessionStore = {
  save(data) {
    try { localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify(data)); }
    catch (e) { console.error('[Session] Save failed:', e); }
  },
  load() {
    try {
      const raw = localStorage.getItem(CONFIG.SESSION_KEY);
      if (!raw) return null;
      const session = JSON.parse(raw);
      if (!this.isValid(session.token)) { this.clear(); return null; }
      return session;
    } catch { return null; }
  },
  clear() {
    try { localStorage.removeItem(CONFIG.SESSION_KEY); }
    catch (e) { console.error('[Session] Clear failed:', e); }
  },
  isValid(token) {
    if (!token) return false;
    const parts = String(token).split('|');
    if (parts.length !== 5) return false;
    return Date.now() < parseInt(parts[4], 10);
  }
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 lib/utils.js
//  Next.js: import { getGreeting, getDateStr, sanitizePin } from '@/lib/utils'
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const Utils = {
  getGreeting() {
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    return 'Good evening';
  },
  getDateStr() {
    return new Date().toLocaleDateString('en-IN', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  },
  sanitizePin:   (v) => String(v).replace(/\D/g, '').slice(0, 4),
  sanitizeId:    (v) => String(v).trim().toUpperCase(),
  firstName:     (name) => (name || '').split(' ')[0],
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 hooks/useToast.js
//  Next.js: import { useToast } from '@/hooks/useToast'
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useToast() {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, type = 'error') => setToast({ msg, type }), []);
  const hide = useCallback(() => setToast(null), []);
  return { toast, showToast: show, hideToast: hide };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 hooks/useAuth.js
//  Next.js: import { useAuth } from '@/hooks/useAuth'
//  Handles login API call + role validation + session save
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useAuth({ onSuccess, onError }) {
  const [loading, setLoading] = useState(false);

  const login = useCallback(async (staffId, pin) => {
    setLoading(true);
    try {
      const data = await Api.get({
        action:  'login',
        city:    CONFIG.CITY_DEFAULT,
        staffId: Utils.sanitizeId(staffId),
        pin:     pin.trim()
      });

      if (data.role !== CONFIG.ALLOWED_ROLE) {
        throw new Error('This app is for Telecallers only');
      }

      const session = {
        token:     data.token,
        staffId:   data.staffId,
        staffName: data.staffName,
        role:      data.role,
        city:      data.city,
        clientId:  data.clientId,
        loginAt:   Date.now()
      };
      SessionStore.save(session);
      onSuccess(session);
    } catch (e) {
      const msg = e.message.includes('Invalid') ? 'Invalid Staff ID or PIN'
                : e.message.includes('attempts') ? 'Too many attempts. Wait 10 min.'
                : e.message || 'Login failed';
      onError(msg);
    } finally {
      setLoading(false);
    }
  }, [onSuccess, onError]);

  return { login, loading };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 hooks/useTokenRefresh.js
//  Next.js: import { useTokenRefresh } from '@/hooks/useTokenRefresh'
//  Silently refreshes token every 25 min, logs out on failure
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useTokenRefresh(session, onExpired) {
  const timerRef = useRef(null);

  useEffect(() => {
    if (!session) return;
    timerRef.current = setInterval(async () => {
      try {
        const data = await Api.get({
          action:  'login',
          city:    session.city,
          staffId: session.staffId,
          token:   session.token
        });
        SessionStore.save({ ...session, token: data.token, loginAt: Date.now() });
      } catch {
        onExpired();
      }
    }, CONFIG.REFRESH_MS);

    return () => clearInterval(timerRef.current);
  }, [session]);
}

//  📁 components/ui/Toast.jsx
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  useEffect(() => {
    const t = setTimeout(onDone, 3200);
    return () => clearTimeout(t);

  return (
    <div className="toast-wrap" role="alert" aria-live="polite">
      <div className={`toast-inner ${type}`}>{msg}</div>
    </div>

};

//  Next.js: 'use client' directive at top of file
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const LoginCard = ({ onLogin }) => {
  const [staffId, setStaffId] = useState('');
  const [pin,     setPin]     = useState('');
  const [error,   setError]   = useState('');
  const [shaking, setShaking] = useState(false);

  const { toast, showToast, hideToast } = useToast();

  const shake = useCallback(() => {
    setShaking(true);
    setTimeout(() => setShaking(false), 450);
  }, []);

  const { login, loading } = useAuth({
    onSuccess: onLogin,
    onError: (msg) => {
      shake();
      setError(msg);
      showToast(msg, 'error');
      setPin('');
    }
  });

  const handleSubmit = useCallback(() => {
    const id = staffId.trim();
    const p  = pin.trim();
    if (!id)          { showToast('Enter your Staff ID');   return; }
    if (p.length < 4) { showToast('Enter your 4-digit PIN'); return; }
    setError('');
    login(id, p);
  }, [staffId, pin, login, showToast]);

  // Auto-submit on 4th PIN digit
  useEffect(() => {
    if (pin.length === 4 && staffId.trim()) {
      const t = setTimeout(handleSubmit, 80);
      return () => clearTimeout(t);
    }
  }, [pin, staffId]);

  const onKeyDown = useCallback(
    (e) => { if (e.key === 'Enter') handleSubmit(); },
    [handleSubmit]
  );

  return (
    <div className="login-screen">
      <div className={`login-card${shaking ? ' shake' : ''}`} role="main">

        {/* Brand */}
        <div className="login-logo-wrap">
          <BrandLogo size="lg" />
          <div className="login-title">Telecaller Console</div>
          <div className="login-sub">CollectPro · VOA Recovery Operations</div>
        </div>

        {/* Staff ID */}
        <div className="form-group">
          <label className="form-label" htmlFor="staffId">Staff ID</label>
          <input
            id="staffId"
            className="form-input"
            type="text"
            value={staffId}
            onChange={e => setStaffId(e.target.value.toUpperCase())}
            onKeyDown={onKeyDown}
            placeholder="e.g. TC_001"
            autoCapitalize="characters"
            autoCorrect="off"
            autoComplete="username"
            spellCheck={false}
            disabled={loading}
          />
        </div>

        {/* PIN */}
        <div className="form-group" style={{ marginBottom: 8 }}>
          <label className="form-label" htmlFor="pin">PIN</label>
          <input
            id="pin"
            className="form-input pin-field"
            type="password"
            inputMode="numeric"
            pattern="[0-9]*"
            maxLength={4}
            value={pin}
            onChange={e => setPin(Utils.sanitizePin(e.target.value))}
            onKeyDown={onKeyDown}
            placeholder="• • • •"
            autoComplete="current-password"
            disabled={loading}
          />
        </div>

        <PinDots length={pin.length} />

        {/* Submit */}
        <button
          className="btn-login"
          onClick={handleSubmit}
          disabled={loading}
          aria-busy={loading}
        >
          {loading
            ? <><Spinner /><span>Signing in...</span></>
            : 'Sign In →'
          }
        </button>

        {error && (
          <div className="login-error" role="alert">{error}</div>
        )}
      </div>

      {toast && <Toast msg={toast.msg} type={toast.type} onDone={hideToast} />}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 app/dashboard/layout.jsx  (AppShell)
//  In Next.js this becomes the layout wrapper for all
//  authenticated pages under app/(authenticated)/layout.jsx
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const AppShell = ({ session, onLogout }) => {
  const [activePage, setActivePage] = useState('dash');
  const { toast, showToast, hideToast } = useToast();

  const handleLogout = useCallback(() => {
    SessionStore.clear();
    onLogout();
  }, [onLogout]);

  // Token auto-refresh hook
  useTokenRefresh(session, handleLogout);

  const PAGE_MAP = {
    dash:     <DashboardPage session={session} />,
    accounts: <AccountsPage />,
    earnings: <EarningsPage />,
    report:   <ReportPage   />,
  };

  return (
    <div className="app">
      <AppHeader session={session} onLogout={handleLogout} />

      <div className="main-content">
        {NAV_ITEMS.map(n => (
          <div key={n.id} className={`page${activePage === n.id ? ' on' : ''}`}>
            {PAGE_MAP[n.id]}
          </div>
        ))}
      </div>

      <BottomNav active={activePage} onChange={setActivePage} />

      {toast && <Toast msg={toast.msg} type={toast.type} onDone={hideToast} />}
    </div>
  );
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 app/page.jsx  (Root — Auth Gate)
//  Next.js: use middleware.ts for auth redirect instead
//  import { redirect } from 'next/navigation'
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const App = () => {
  const [session,  setSession]  = useState(null);
  const [checking, setChecking] = useState(true);

  // Restore session on mount
  // Next.js: move to middleware.ts for server-side auth check
  useEffect(() => {
    const saved = SessionStore.load();
    if (saved) setSession(saved);
    setChecking(false);
  }, []);

  if (checking) return <LoadingOverlay text="CollectPro loading..." />;

  return session
    ? <AppShell session={session} onLogout={() => setSession(null)} />
    : <LoginCard onLogin={s => setSession(s)} />;
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  📁 app/layout.jsx  (Root Mount)
//  Next.js: ReactDOM.createRoot replaced by Next.js runtime
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
